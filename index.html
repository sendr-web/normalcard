<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 文档内联插入与编辑原型</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* 隐藏滚动条 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    /* 补充 Tailwind-animate 插件缺失的底层动画关键帧 */
    @keyframes fadeInSlideUp2 {
      from { opacity: 0; transform: translateY(0.5rem); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInSlideUp4 {
      from { opacity: 0; transform: translateY(1rem); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInZoom95 {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    /* 映射对应类名 */
    .slide-in-from-bottom-2 { animation: fadeInSlideUp2 ease-out forwards; }
    .slide-in-from-bottom-4 { animation: fadeInSlideUp4 ease-out forwards; }
    .zoom-in-95 { animation: fadeInZoom95 ease-out forwards; }
    
    .duration-200 { animation-duration: 200ms; }
    .duration-300 { animation-duration: 300ms; }
    .duration-500 { animation-duration: 500ms; }
    .delay-150 { animation-delay: 150ms; }
    .fill-mode-both { animation-fill-mode: both; }
  </style>
</head>
<body class="bg-gray-900">
  <div id="root"></div>

  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Copy, ArrowUpToLine, Check, Sparkles, 
      ChevronDown, Keyboard, Plus, ListTodo,
      Wifi, Battery, Signal, X, Pencil, Trash2, MessageSquare
    } from 'lucide-react';

    function App() {
      // --- 状态管理 ---
      const [isAiPanelOpen, setIsAiPanelOpen] = useState(true); // 默认打开AI面板以便演示
      const [view, setView] = useState('home'); // 'home' 或 'chat'
      
      const [copied, setCopied] = useState(false);
      const [insertedBtnState, setInsertedBtnState] = useState(false); // 按钮上的状态
      
      const [isSummaryInserted, setIsSummaryInserted] = useState(false); // 文档中是否已插入摘要
      const [toastMsg, setToastMsg] = useState(''); // Toast 提示信息

      // --- 内容编辑状态管理 ---
      const defaultSummary = {
        tldr: "Q3营收超预期增长25%，但新用户留存微降。Q4战略核心将全面转向海外市场，重点发力东南亚本地化运营。",
        actions: [
          "数据组：本周五前输出留存率下降归因分析报告。",
          "市场部：下周二前完成东南亚市场 Q4 投放预算对齐。"
        ]
      };
      const [summaryData, setSummaryData] = useState(defaultSummary);
      const [editData, setEditData] = useState(defaultSummary);
      const [isEditingSummary, setIsEditingSummary] = useState(false);

      // --- 交互处理函数 ---
      const handleCopy = () => {
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const handleInsert = () => {
        setInsertedBtnState(true);
        // 模拟短暂的处理延迟，增强真实感
        setTimeout(() => {
          setIsSummaryInserted(true);      // 1. 文档更新
          setIsAiPanelOpen(false);         // 2. 收起面板
          setInsertedBtnState(false);      // 3. 恢复按钮状态（以便下次打开）
          showToast('✅ 已成功插入文档顶部'); // 4. 触发 Toast
        }, 600);
      };

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 3000);
      };

      const handleSummarizeClick = () => {
        setView('chat');
      };

      const handleBackToHome = () => {
        setView('home');
      };

      const handleClosePanel = () => {
        setIsAiPanelOpen(false);
      };

      const handleOpenPanel = () => {
        setIsAiPanelOpen(true);
      };

      const handleRemoveSummary = () => {
        setIsSummaryInserted(false);
        showToast('🗑️ 已移除 AI 摘要');
      };

      const handleEditStart = () => {
        setEditData({ ...summaryData, actions: [...summaryData.actions] });
        setIsEditingSummary(true);
      };

      const handleEditSave = () => {
        setSummaryData(editData);
        setIsEditingSummary(false);
        showToast('✅ 摘要修改已保存');
      };

      const handleEditCancel = () => {
        setIsEditingSummary(false);
      };

      return (
        <div className="min-h-screen bg-gray-900 flex items-center justify-center p-6 font-sans">
          {/* 模拟移动端容器 */}
          <div className="w-full max-w-[400px] h-[800px] bg-white rounded-[3rem] shadow-2xl overflow-hidden flex flex-col relative border-[8px] border-gray-800">
            
            {/* iOS 状态栏模拟 */}
            <div className="flex justify-between items-center px-6 pt-3 pb-2 text-gray-900 z-40 bg-white/80 backdrop-blur-md absolute top-0 w-full">
              <span className="text-sm font-semibold">9:41</span>
              <div className="flex items-center space-x-1.5">
                <Signal className="w-4 h-4" />
                <Wifi className="w-4 h-4" />
                <Battery className="w-5 h-5" />
              </div>
            </div>

            {/* ================= [ 底层：文档阅读区 ] ================= */}
            <div className="flex-1 overflow-y-auto bg-gray-50 pt-16 pb-24 px-5">
              {/* 文档标题 */}
              <h1 className="text-2xl font-bold text-gray-900 mb-6 leading-tight mt-4">
                Q3产品复盘与Q4海外市场开拓规划
              </h1>

              {/* 🌟 插入的 AI 摘要区块 (条件渲染) */}
              <div className={`transition-all duration-500 origin-top overflow-hidden ${isSummaryInserted ? 'max-h-[800px] opacity-100 mb-8 scale-100' : 'max-h-0 opacity-0 mb-0 scale-95'}`}>
                <div className="relative p-[1.5px] rounded-xl bg-gradient-to-br from-blue-400 via-purple-400 to-orange-300 shadow-sm">
                  <div className="bg-white rounded-[10px] p-4 relative">
                    {/* 装饰与标题 */}
                    <div className="flex items-center space-x-1.5 mb-3">
                      <Sparkles className="w-4 h-4 text-blue-600" />
                      <span className="text-sm font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-purple-600">
                        AI 摘要
                      </span>
                    </div>
                    
                    {/* 绝对控制权：编辑与移除 (仅在非编辑态显示) */}
                    {!isEditingSummary && (
                      <div className="absolute top-3.5 right-3.5 flex space-x-1">
                        <button onClick={handleEditStart} className="p-1.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-colors" title="编辑">
                          <Pencil className="w-3.5 h-3.5" />
                        </button>
                        <button onClick={handleRemoveSummary} className="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-md transition-colors" title="移除">
                          <Trash2 className="w-3.5 h-3.5" />
                        </button>
                      </div>
                    )}

                    {/* 摘要简版内容 (展示态 vs 编辑态) */}
                    {!isEditingSummary ? (
                      <div className="space-y-3 animate-in fade-in duration-300">
                        <div>
                          <h4 className="text-xs font-semibold text-gray-500 mb-1">一句话总结</h4>
                          <p className="text-sm text-gray-800 font-medium leading-relaxed">
                            {summaryData.tldr}
                          </p>
                        </div>
                        <div className="pt-2 border-t border-gray-100">
                          <h4 className="text-xs font-semibold text-gray-500 mb-2">行动建议</h4>
                          <ul className="text-sm text-gray-700 space-y-1.5 list-disc pl-4 marker:text-blue-400">
                            {summaryData.actions.map((act, i) => (
                              <li key={i}>{act}</li>
                            ))}
                          </ul>
                        </div>
                      </div>
                    ) : (
                      <div className="space-y-4 mt-2 animate-in fade-in zoom-in-95 duration-200">
                        {/* 一句话总结输入框 */}
                        <div>
                          <h4 className="text-xs font-semibold text-gray-500 mb-1.5">编辑一句话总结</h4>
                          <textarea 
                            className="w-full text-sm text-gray-800 p-2.5 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition-all resize-none"
                            rows="3"
                            value={editData.tldr}
                            onChange={(e) => setEditData({...editData, tldr: e.target.value})}
                          />
                        </div>
                        
                        {/* 行动建议输入框组 */}
                        <div>
                          <h4 className="text-xs font-semibold text-gray-500 mb-1.5">编辑行动建议</h4>
                          <div className="space-y-2">
                            {editData.actions.map((act, i) => (
                              <input 
                                key={i}
                                type="text"
                                className="w-full text-sm text-gray-800 p-2 bg-gray-50 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition-all"
                                value={act}
                                onChange={(e) => {
                                  const newActions = [...editData.actions];
                                  newActions[i] = e.target.value;
                                  setEditData({...editData, actions: newActions});
                                }}
                              />
                            ))}
                          </div>
                        </div>
                        
                        {/* 操作按钮 */}
                        <div className="flex justify-end space-x-2 pt-2 border-t border-gray-100">
                          <button 
                            onClick={handleEditCancel}
                            className="px-4 py-1.5 text-xs font-medium text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-md transition-colors"
                          >
                            取消
                          </button>
                          <button 
                            onClick={handleEditSave}
                            className="px-4 py-1.5 text-xs font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md transition-colors flex items-center space-x-1 shadow-sm active:scale-95"
                          >
                            <Check className="w-3.5 h-3.5" />
                            <span>保存修改</span>
                          </button>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>

              {/* 文档正文占位 */}
              <div className="space-y-4 text-gray-600 text-[15px] leading-relaxed">
                <p>在刚刚过去的第三季度中，我们的核心产品线表现强劲。得益于七月份推出的“夏日裂变”活动，整体活跃用户数突破了历史新高。从财务数据来看，Q3 整体营收同比增长 25%，超出了我们上个季度末制定的预期目标。</p>
                <p>然而，在快速增长的背后，我们也捕捉到了一些需要警惕的数据信号。根据数据分析组的初步报告，九月份新获取的用户的次月留存率相较于行业大盘出现了约 5% 的轻微下滑。</p>
                <p>展望 Q4，国内市场的获客成本正在急剧攀升，ROI 逐渐趋近临界值。因此，管理层决定将未来的增长引擎寄托于海外市场。东南亚地区凭借其庞大的人口基数和逐渐成熟的移动互联网基础设施，将成为我们出海的第一站。</p>
              </div>
            </div>

            {/* 悬浮球 (当面板收起时显示) */}
            <div 
              className={`absolute bottom-8 right-5 z-30 transition-all duration-300 ${!isAiPanelOpen ? 'scale-100 opacity-100 translate-y-0' : 'scale-50 opacity-0 translate-y-10 pointer-events-none'}`}
            >
              <button 
                onClick={handleOpenPanel}
                className="w-14 h-14 bg-gray-900 text-white rounded-full shadow-xl flex items-center justify-center hover:bg-gray-800 active:scale-95 transition-all ring-4 ring-gray-900/10"
              >
                <Sparkles className="w-6 h-6" />
              </button>
            </div>

            {/* 全局 Toast 提示 */}
            <div className={`absolute top-20 left-1/2 -translate-x-1/2 z-50 transition-all duration-300 pointer-events-none ${toastMsg ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4'}`}>
              <div className="bg-gray-800/90 backdrop-blur-sm text-white px-4 py-2.5 rounded-full text-sm font-medium shadow-lg whitespace-nowrap">
                {toastMsg}
              </div>
            </div>

            {/* ================= [ 上层：AI 助手浮层面板 (Bottom Sheet) ] ================= */}
            {/* 背景遮罩 */}
            <div 
              className={`absolute inset-0 bg-black/40 z-40 transition-opacity duration-300 ${isAiPanelOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
              onClick={handleClosePanel}
            ></div>

            <div 
              className={`absolute bottom-0 left-0 right-0 bg-white z-50 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.1)] transition-transform duration-500 flex flex-col ${
                isAiPanelOpen ? 'translate-y-0 h-[88%]' : 'translate-y-full h-[88%]'
              }`}
              style={{ transitionTimingFunction: 'cubic-bezier(0.32, 0.72, 0, 1)' }}
            >
              {/* 面板 Header */}
              <div className="px-5 py-3 border-b border-gray-100 flex items-center justify-between bg-white rounded-t-3xl shrink-0">
                <div 
                  className="flex items-center space-x-1 cursor-pointer hover:bg-gray-50 px-2 py-1 rounded-md transition-colors"
                  onClick={handleBackToHome}
                >
                  <h2 className="text-base font-semibold text-gray-800">AI文档助手</h2>
                  <ChevronDown className="w-4 h-4 text-gray-500" />
                </div>
                <button onClick={handleClosePanel} className="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-full transition-colors">
                  <X className="w-5 h-5" />
                </button>
              </div>

              {/* 核心内容区 - 根据状态切换 */}
              {view === 'home' ? (
                // [ 视图 1：首页默认态 ]
                <div className="flex-1 flex flex-col overflow-hidden">
                  <div className="flex-1 px-6 pt-8 pb-4 overflow-y-auto">
                    <h1 className="text-2xl font-bold text-gray-900 mb-2">
                      Hi, 有什么可以帮你?
                    </h1>
                    <p className="text-sm text-gray-500 mb-8 flex items-center">
                      你似乎在浏览<span className="text-gray-800 font-medium mx-1">《Q3产品复盘...》</span>，我可以帮你
                    </p>

                    {/* 推荐 Prompt */}
                    <div className="space-y-3">
                      <button className="w-full text-left px-5 py-4 bg-gray-50 hover:bg-gray-100 rounded-2xl text-sm text-gray-700 transition-colors">
                        根据文档内容提供3个关键洞察
                      </button>
                      <button className="w-full text-left px-5 py-4 bg-gray-50 hover:bg-gray-100 rounded-2xl text-sm text-gray-700 transition-colors">
                        提取文档中的所有核心数据指标
                      </button>
                      <button className="w-full text-left px-5 py-4 bg-gray-50 hover:bg-gray-100 rounded-2xl text-sm text-gray-700 transition-colors">
                        加粗所有提及的海外国家/地区名称
                      </button>
                    </div>
                  </div>

                  {/* 底部功能区 */}
                  <div className="px-5 pb-8 pt-2 bg-gradient-to-t from-white via-white to-transparent shrink-0">
                    <div className="flex items-center space-x-3 mb-4 overflow-x-auto pb-1 scrollbar-hide">
                      <button 
                        onClick={handleSummarizeClick}
                        className="flex-shrink-0 flex items-center space-x-1.5 px-4 py-2 bg-white border border-gray-200 shadow-sm rounded-full active:scale-95 transition-transform"
                      >
                        <Sparkles className="w-4 h-4 text-blue-600" />
                        <span className="text-sm font-medium text-gray-700">总结</span>
                      </button>
                      <button className="flex-shrink-0 flex items-center space-x-1.5 px-4 py-2 bg-white border border-gray-200 shadow-sm rounded-full active:scale-95 transition-transform">
                        <ListTodo className="w-4 h-4 text-gray-600" />
                        <span className="text-sm font-medium text-gray-700">提取待办</span>
                      </button>
                    </div>

                    <div className="flex items-center justify-between bg-white border border-gray-200 shadow-sm rounded-full p-1.5 h-12">
                      <button className="w-9 h-9 flex items-center justify-center text-gray-500 hover:bg-gray-50 rounded-full transition-colors">
                        <Keyboard className="w-4 h-4" />
                      </button>
                      <div className="flex-1 flex justify-center items-center cursor-pointer text-gray-400 font-medium text-sm">
                        按住说话...
                      </div>
                      <button className="w-9 h-9 flex items-center justify-center text-gray-500 hover:bg-gray-50 rounded-full transition-colors">
                        <Plus className="w-5 h-5" />
                      </button>
                    </div>
                  </div>
                </div>
              ) : (
                // [ 视图 2：聊天与摘要卡片态 ]
                <div className="flex-1 flex flex-col bg-gray-50/50 overflow-hidden">
                  <div className="flex-1 overflow-y-auto p-5 space-y-6">
                    
                    <div className="flex justify-end animate-in slide-in-from-bottom-2 duration-300">
                      <div className="bg-blue-600 text-white px-4 py-2.5 rounded-2xl rounded-tr-sm max-w-[85%] text-sm shadow-sm">
                        请帮我总结一下这篇文档。
                      </div>
                    </div>

                    <div className="flex flex-col space-y-2 animate-in slide-in-from-bottom-4 duration-500 delay-150 fill-mode-both">
                      <div className="flex items-center space-x-2 text-gray-500 mb-1">
                        <Sparkles className="w-4 h-4" />
                        <span className="text-xs font-medium">已为你生成文档结构化摘要：</span>
                      </div>

                      {/* 摘要卡片主体 */}
                      <div className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden group">
                        
                        {/* 一句话总结 */}
                        <div className="bg-blue-50/50 p-4 border-b border-gray-100">
                          <div className="flex items-center mb-2">
                            <span className="text-sm font-semibold text-gray-800">一句话总结</span>
                          </div>
                          <p className="text-sm text-gray-700 leading-relaxed font-medium">
                            本文复盘了 Q3 营收超预期的表现，并明确了 Q4 发力海外市场的战略重点。
                          </p>
                        </div>

                        <div className="p-4 space-y-5">
                          {/* 核心要点 */}
                          <div>
                            <h3 className="text-sm font-semibold text-gray-800 mb-3 flex items-center">
                              <span className="w-1.5 h-4 bg-blue-500 rounded-full mr-2"></span>
                              核心要点
                            </h3>
                            <ul className="space-y-2.5">
                              <li className="flex items-start text-sm text-gray-600 leading-relaxed">
                                <span className="mr-2 mt-0.5">📈</span>
                                <span><strong>营收增长：</strong> Q3 整体营收同比增长 25%，超出预期目标。</span>
                              </li>
                              <li className="flex items-start text-sm text-gray-600 leading-relaxed">
                                <span className="mr-2 mt-0.5">⚠️</span>
                                <span><strong>留存预警：</strong> 新用户次月留存率出现 5% 的轻微下滑，需归因。</span>
                              </li>
                              <li className="flex items-start text-sm text-gray-600 leading-relaxed">
                                <span className="mr-2 mt-0.5">🚀</span>
                                <span><strong>Q4 战略：</strong> 资源向海外市场倾斜，重点发力东南亚本地化运营。</span>
                              </li>
                            </ul>
                          </div>

                          <div className="w-full h-px bg-gray-100"></div>

                          {/* 行动建议 / 结论 */}
                          <div>
                            <h3 className="text-sm font-semibold text-gray-800 mb-3 flex items-center">
                              <span className="w-1.5 h-4 bg-orange-500 rounded-full mr-2"></span>
                              行动建议
                            </h3>
                            <div className="space-y-2 bg-gray-50 rounded-lg p-3 border border-gray-100">
                              <label className="flex items-start space-x-2 cursor-pointer group/task">
                                <input type="checkbox" className="mt-1 rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                                <span className="text-sm text-gray-600 group-hover/task:text-gray-900 transition-colors">
                                  <strong>数据组：</strong>输出留存率下降归因分析报告。
                                </span>
                              </label>
                              <label className="flex items-start space-x-2 cursor-pointer group/task">
                                <input type="checkbox" className="mt-1 rounded border-gray-300 text-blue-600 focus:ring-blue-500" />
                                <span className="text-sm text-gray-600 group-hover/task:text-gray-900 transition-colors">
                                  <strong>市场部：</strong>完成东南亚市场 Q4 投放预算对齐。
                                </span>
                              </label>
                            </div>
                          </div>
                        </div>

                        {/* 底部操作区 */}
                        <div className="bg-gray-50/80 px-4 py-3 border-t border-gray-100 flex items-center justify-end space-x-2">
                          <button 
                            onClick={handleCopy}
                            className="flex items-center space-x-1.5 px-3 py-1.5 text-xs font-medium text-gray-600 hover:text-gray-900 hover:bg-gray-200/50 rounded-md transition-all active:scale-95"
                          >
                            {copied ? <Check className="w-3.5 h-3.5 text-green-600" /> : <Copy className="w-3.5 h-3.5" />}
                            <span className={copied ? "text-green-600" : ""}>{copied ? '已复制' : '复制内容'}</span>
                          </button>
                          <button 
                            onClick={handleInsert}
                            className={`flex items-center space-x-1.5 px-3 py-1.5 text-xs font-medium rounded-md transition-all active:scale-95 ${
                              insertedBtnState 
                                ? 'bg-green-50 text-green-700 border border-green-200' 
                                : 'bg-white text-gray-700 border border-gray-200 shadow-sm hover:bg-gray-50 hover:border-gray-300'
                            }`}
                          >
                            {insertedBtnState ? <Check className="w-3.5 h-3.5" /> : <ArrowUpToLine className="w-3.5 h-3.5" />}
                            <span>{insertedBtnState ? '处理中...' : '插入文档顶部'}</span>
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 底部文本输入框 */}
                  <div className="p-4 bg-white border-t border-gray-100 shrink-0">
                    <div className="relative">
                      <input 
                        type="text" 
                        placeholder="继续提问..." 
                        className="w-full bg-gray-50 border border-gray-200 text-sm rounded-full py-2.5 pl-4 pr-10 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all"
                      />
                      <button className="absolute right-2 top-1.5 p-1 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors">
                        <ArrowUpToLine className="w-4 h-4 rotate-90" />
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* Home Indicator */}
            <div className="absolute bottom-2 left-1/2 transform -translate-x-1/2 w-32 h-1 bg-gray-300 rounded-full z-50 pointer-events-none"></div>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
